services:
  postgres:
    image: postgres:16
    container_name: emagreceplus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emagreceplus
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres_shadow:
    image: postgres:16
    container_name: emagreceplus-postgres-shadow
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: emagreceplus_shadow
    ports:
      - "55433:5432"
    volumes:
      - postgres_shadow_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_shadow_data: